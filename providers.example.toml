# Harness Engineering — Provider Configuration
#
# Copy to providers.toml (git-ignored) and edit as needed.
#
# Fields per provider:
#   type          = "anthropic" | "openai"            (required)
#   default_model = model used when --model is omitted (required)
#   models        = list of available models           (optional, documents choices)
#   base_url      = API endpoint override              (optional, openai only)
#   api_key_env   = name of env var holding the key   (optional)
#
# Select a model at runtime:
#   uv run main.py "task" --provider deepseek
#   uv run main.py "task" --provider deepseek --model deepseek-reasoner

[providers.anthropic]
type          = "anthropic"
api_key_env   = "ANTHROPIC_API_KEY"
default_model = "claude-sonnet-4-5-20250929"
models = [
    "claude-sonnet-4-5-20250929",
    "claude-opus-4-6",
    "claude-haiku-4-5-20251001",
]

[providers.deepseek]
type          = "openai"
base_url      = "https://api.deepseek.com/v1"
api_key_env   = "DEEPSEEK_API_KEY"
default_model = "deepseek-chat"
models = [
    "deepseek-chat",
    "deepseek-reasoner",
]

[providers.openai]
type          = "openai"
api_key_env   = "OPENAI_API_KEY"
default_model = "gpt-4o"
models = [
    "gpt-4o",
    "gpt-4o-mini",
    "o3",
    "o4-mini",
]

